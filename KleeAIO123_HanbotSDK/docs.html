<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hanbot Documentation</title>

  <!-- Apply saved theme class BEFORE any CSS loads — prevents flash -->
  <script>
    if (localStorage.getItem("theme")) document.documentElement.classList.add("dark");
  </script>

  <!-- Single unified theme stylesheet — no swapping needed -->
  <link rel="stylesheet" href="resources/flatdoc/theme.css">

  <!-- Meta -->
  <meta content="HanbotND SDK Documentation" property="og:title">
  <meta content="HanbotND SDK Documentation" name="description">
</head>
<body role='flatdoc'>

  <div class='header'>
    <div class='left'>
      <h1>SDK Documentation</h1>
    </div>
    <button class="theme-toggle" onclick="switch_theme()" id="theme-button" aria-label="Toggle theme">
      <svg class="theme-icon sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="theme-icon moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>

  <div class='content-root'>
    <div class='menubar'>
      <div class='menu section' role='flatdoc-menu'></div>
    </div>
    <div role='flatdoc-content' class='content'></div>
  </div>

  <!-- Scripts at end of body — non-blocking -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
  <script src='resources/flatdoc/flatdoc.js'></script>
  <script src='resources/flatdoc/theme-white-script.js'></script>
  <script>
    // Override generic highlighter: fix Lua comments (--) and number-in-identifier highlighting
    Flatdoc.highlighters.generic = function(code) {
      // Step 1: escape HTML
      code = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // Step 2: extract strings and comments into placeholders so later
      //         regexes don't modify their contents
      var slots = [];
      function hold(html) { slots.push(html); return '\x00S' + (slots.length - 1) + 'S\x00'; }

      // Strings first
      code = code.replace(/"[^"]*?"/g,  function(m) { return hold('<span class="string">' + m + '</span>'); });
      code = code.replace(/'[^']*?'/g,  function(m) { return hold('<span class="string">' + m + '</span>'); });
      // Then comments (-- or // or #) — entire rest of line
      code = code.replace(/(\/\/|--|#)(.*)/gm, function(m, p1, p2) { return hold('<span class="comment">' + p1 + p2 + '</span>'); });

      // Step 3: all other highlighting (won't touch placeholders)
      code = code
        .replace(/(?<![a-zA-Z_])(\d+\.\d+)(?![a-zA-Z_])/gm, '<span class="number">$1</span>')
        .replace(/(?<![a-zA-Z_])(\d+)(?![a-zA-Z_])/gm, '<span class="number">$1</span>')
        .replace(/\b(function|new|throw|return|var|if|else|then|end|for|in|do)\b/gm, '<span class="keyword">$1</span>')
        .replace(/\b(player|hero)\b/gm, '<span class="hero">$1</span>')
        .replace(/\b(module|internal)\b/gm, '<span class="module">$1</span>')
        .replace(/\b(pred|ts|orb)\b/gm, '<span class="orb">$1</span>')
        .replace(/{/g, '<span class="include">{</span>')
        .replace(/}/g, '<span class="include">}</span>')
        .replace(/\(/g, '<span class="include">(</span>')
        .replace(/\)/g, '<span class="include">)</span>')
        .replace(/\b(local)\b/gm, '<span class="local">$1</span>')
        .replace(/\b(cb)\b/gm, '<span class="cb">$1</span>')
        .replace(/\b(print)\b/gm, '<span class="print">$1</span>')
        .replace(/\b(draw|tick|pre_tick|spell|keyup|keydown|issueorder|issue_order|castspell|cast_spell|attack_cancel|cast_finish|play_animation|delete_minion|create_minion|delete_particle|create_particle|delete_missile|create_missile|buff_gain|path|draw2|sprite|error)\b/gm, '<span class="cbfunc">$1</span>')
        .replace(/\b(add)\b/gm, '<span class="add">$1</span>');

      // Step 4: restore placeholders
      code = code.replace(/\x00S(\d+)S\x00/g, function(m, i) { return slots[i]; });
      return code;
    };

    Flatdoc.run({
      fetcher: Flatdoc.file('resources/content.md')
    });

    function switch_theme() {
      document.documentElement.classList.toggle("dark");
      if (document.documentElement.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.removeItem("theme");
      }
    }

    // Make object.property text clickable to copy .property
    $(document).on('flatdoc:ready', function() {
      // Match patterns like "spell.endPos", "missile.speed", "path.endPos2D" etc.
      // in list items and paragraphs (not inside <code> or <pre>)
      $('.content li, .content p').each(function() {
        var el = this;
        // Walk text nodes only
        var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
        var textNodes = [];
        while (walker.nextNode()) {
          // Skip text nodes inside <code> or <pre>
          var parent = walker.currentNode.parentNode;
          if (parent && (parent.tagName === 'CODE' || parent.tagName === 'PRE' || parent.closest && parent.closest('pre'))) continue;
          if (/\w+\.\w+/.test(walker.currentNode.nodeValue)) {
            textNodes.push(walker.currentNode);
          }
        }
        textNodes.forEach(function(node) {
          var html = node.nodeValue
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/(\w+(?:\.\w+)+)/g, function(match) {
              var lastDot = match.lastIndexOf('.');
              var prop = match.substring(lastDot);
              return '<span class="prop-click" data-copy="' + prop.replace(/"/g, '&quot;') + '" title="Click to copy ' + prop + '">' + match + '</span>';
            });
          var wrapper = document.createElement('span');
          wrapper.innerHTML = html;
          node.parentNode.replaceChild(wrapper, node);
        });
      });

      $(document).on('click', '.prop-click', function() {
        var text = $(this).data('copy');
        var el = $(this);
        navigator.clipboard.writeText(text).then(function() {
          el.addClass('prop-copied');
          setTimeout(function() { el.removeClass('prop-copied'); }, 800);
        });
      });
    });

    // Add copy buttons to all code blocks after Flatdoc renders
    $(document).on('flatdoc:ready', function() {
      $('.content pre').each(function() {
        var btn = $('<button class="copy-btn" title="Copy">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>' +
          '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>' +
          '</svg><span>Copy</span></button>');
        $(this).css('position', 'relative').append(btn);
      });

      $(document).on('click', '.copy-btn', function() {
        var code = $(this).closest('pre').find('code').text();
        var btn = $(this);
        navigator.clipboard.writeText(code).then(function() {
          btn.addClass('copied').find('span').text('Copied!');
          setTimeout(function() {
            btn.removeClass('copied').find('span').text('Copy');
          }, 1500);
        });
      });
    });
  </script>

</body>
</html>
